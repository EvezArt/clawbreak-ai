<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawBreak</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#2a2a2a;--text:#e0e0e0;--text2:#888;--accent:#4f46e5;--accent2:#7c3aed;--green:#22c55e;--red:#ef4444;--yellow:#eab308}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface)}
header h1{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .status{margin-left:auto;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px}
header .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
header .dot.off{background:var(--red)}
nav{display:flex;gap:4px;padding:8px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
nav button{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
nav button:hover{color:var(--text);border-color:var(--text2)}
nav button.active{background:var(--accent);color:white;border-color:var(--accent)}
main{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;display:none;flex-direction:column}
.panel.active{display:flex}
#chat-panel .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:85%;padding:12px 16px;border-radius:12px;line-height:1.5;font-size:14px;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--accent);color:white;border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg .tool-call{background:rgba(79,70,229,.15);border:1px solid rgba(79,70,229,.3);border-radius:8px;padding:8px 12px;margin:8px 0;font-size:12px;font-family:monospace;color:var(--accent2)}
.msg .tool-result{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);border-radius:8px;padding:8px 12px;margin:4px 0;font-size:12px;font-family:monospace;color:var(--green)}
#chat-panel .input-area{padding:16px 20px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:8px}
#chat-panel .input-area textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;resize:none;outline:none;font-family:inherit;min-height:44px;max-height:120px}
#chat-panel .input-area textarea:focus{border-color:var(--accent)}
#chat-panel .input-area button{background:var(--accent);color:white;border:none;border-radius:8px;padding:0 20px;cursor:pointer;font-size:14px;font-weight:600;transition:background .2s}
#chat-panel .input-area button:hover{background:var(--accent2)}
#memory-panel{padding:20px;overflow-y:auto}
#memory-panel h2{font-size:16px;margin-bottom:16px;color:var(--text2)}
.fact-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:start;gap:12px}
.fact-card .key{font-weight:600;color:var(--accent2);font-size:13px}
.fact-card .value{color:var(--text);font-size:13px;margin-top:4px}
.fact-card .cat{color:var(--yellow);font-size:11px;margin-top:4px}
.fact-card button{background:var(--red);color:white;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px}
#settings-panel{padding:20px;overflow-y:auto}
#settings-panel .field{margin-bottom:16px}
#settings-panel label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
#settings-panel input,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:14px}
#settings-panel button{background:var(--accent);color:white;border:none;border-radius:6px;padding:8px 20px;cursor:pointer;margin-top:8px}
.typing{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:bounce .6s infinite alternate}
@keyframes bounce{0%{opacity:.3;transform:translateY(0)}100%{opacity:1;transform:translateY(-4px)}}
@media(max-width:600px){.msg{max-width:95%}header h1{font-size:15px}nav button{padding:5px 10px;font-size:12px}}
</style>
</head>
<body>
<header>
<h1>⚡ ClawBreak</h1>
<div class="status"><div class="dot" id="status-dot"></div><span id="status-text">Connecting...</span></div>
</header>
<nav>
<button class="active" onclick="showPanel('chat')">💬 Chat</button>
<button onclick="showPanel('memory')">🧠 Memory</button>
<button onclick="showPanel('settings')">⚙️ Settings</button>
</nav>
<main>
<div id="chat-panel" class="panel active">
<div class="messages" id="messages"></div>
<div class="input-area">
<textarea id="msg-input" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<button onclick="send()">Send</button>
</div>
</div>
<div id="memory-panel" class="panel">
<h2>Stored Facts</h2>
<div id="facts-list"></div>
</div>
<div id="settings-panel" class="panel">
<div class="field"><label>API Key</label><input type="password" id="cfg-apikey" placeholder="sk-..."></div>
<div class="field"><label>Base URL</label><input type="text" id="cfg-baseurl" value="https://api.vultrinference.com/v1"></div>
<div class="field"><label>Model</label><input type="text" id="cfg-model" value="zai-org/GLM-5.1-FP8"></div>
<div class="field"><label>System Prompt</label><textarea id="cfg-system" rows="4" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:13px"></textarea></div>
<button onclick="saveConfig()">Save</button>
</div>
</main>
<script>
const API=location.origin;
let sessionId='default';
function showPanel(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));document.getElementById(id+'-panel').classList.add('active');event.target.classList.add('active');if(id==='memory')loadFacts();if(id==='settings')loadConfig()}
function addMsg(role,text){const d=document.createElement('div');d.className='msg '+role;
let html=text.replace(/&/g,'&amp;').replace(/</g,'&lt;');
// Highlight tool calls
html=html.replace(/\[tool:(\w+)\((.*?)\)\]/g,'<div class="tool-call">🔧 $1($2)</div>');
html=html.replace(/\[tool:\w+ result\]/g,m=>'<div class="tool-result">'+m+'</div>');
d.innerHTML=html;document.getElementById('messages').appendChild(d);document.getElementById('messages').scrollTop=999999}
async function send(){const input=document.getElementById('msg-input');const text=input.value.trim();if(!text)return;input.value='';addMsg('user',text);
const typing=document.createElement('div');typing.className='msg assistant';typing.innerHTML='<span class="typing"></span><span class="typing" style="animation-delay:.2s"></span><span class="typing" style="animation-delay:.4s"></span>';document.getElementById('messages').appendChild(typing);document.getElementById('messages').scrollTop=999999;
try{const r=await fetch(API+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,session_id:sessionId})});const d=await r.json();typing.remove();addMsg('assistant',d.reply||d.error||'No response')}
catch(e){typing.remove();addMsg('assistant','Error: '+e.message)}}
async function loadFacts(){try{const r=await fetch(API+'/memory');const d=await r.json();const el=document.getElementById('facts-list');el.innerHTML='';
if(!d.facts||!d.facts.length){el.innerHTML='<p style="color:var(--text2)">No facts stored yet. Ask me to remember something!</p>';return}
d.facts.forEach(f=>{const card=document.createElement('div');card.className='fact-card';card.innerHTML=`<div><div class="key">${f.key}</div><div class="value">${f.value}</div><div class="cat">${f.category} · accessed ${f.access_count}x</div></div><button onclick="delFact('${f.key}')">×</button>`;el.appendChild(card)})}
catch(e){document.getElementById('facts-list').innerHTML='<p style="color:var(--red)">Error loading facts</p>'}}
async function delFact(key){await fetch(API+'/memory/'+key,{method:'DELETE'});loadFacts()}
async function loadConfig(){try{const r=await fetch(API+'/config');const d=await r.json();document.getElementById('cfg-apikey').value=d.llm?.api_key||'';document.getElementById('cfg-baseurl').value=d.llm?.base_url||'';document.getElementById('cfg-model').value=d.llm?.model||'';document.getElementById('cfg-system').value=d.system_prompt||''}catch(e){}}
async function saveConfig(){const cfg={llm:{},system_prompt:document.getElementById('cfg-system').value};
const key=document.getElementById('cfg-apikey').value;if(key&&!key.endsWith('...'))cfg.llm.api_key=key;
cfg.llm.base_url=document.getElementById('cfg-baseurl').value;cfg.llm.model=document.getElementById('cfg-model').value;
await fetch(API+'/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});alert('Saved!')}
async function checkHealth(){try{const r=await fetch(API+'/health');const d=await r.json();document.getElementById('status-dot').className='dot';document.getElementById('status-text').textContent=d.model||'OK'}catch{document.getElementById('status-dot').className='dot off';document.getElementById('status-text').textContent='Offline'}}
checkHealth();setInterval(checkHealth,30000);
</script>
</body>
</html>
