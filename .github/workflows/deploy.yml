name: Deploy ClawBreak
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (docker-hub, render, railway)'
        required: false
        default: 'docker-hub'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: github.event.inputs.target == 'docker-hub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event.inputs.target == 'docker-hub' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/clawbreak:latest
            ${{ secrets.DOCKER_USERNAME }}/clawbreak:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
